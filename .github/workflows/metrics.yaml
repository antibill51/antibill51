name: Metrics
on:
  schedule:
    # Exécution une fois par jour à 2h00 du matin (heure serveur)
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

# Indispensable : autorise le workflow à pousser les nouveaux SVG générés sur le dépôt
permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Metrics 1
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics1.svg
          user: antibill51
          base: header, activity, repositories, metadata
          config_timezone: Europe/Paris
          config_twemoji: yes
          use_prebuilt_image: yes
          
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, release, fork, review, ref/create

          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_details: bytes-size, percentage
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 2%

          plugin_lines: yes

          plugin_notable: yes
          plugin_notable_filter: stars:>1
          plugin_notable_indepth: yes

      - name: Metrics 2
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics2.svg
          user: antibill51
          base: ""
          config_timezone: Europe/Paris
          config_twemoji: yes
          use_prebuilt_image: yes

          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_from: 200

          plugin_achievements: yes
          plugin_achievements_display: compact
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_achievements_ignored: deployer, gister, automator

          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

          # Ajout du plugin topics pour valoriser tes stacks (Cyber, Proxmox, etc.)
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_mode: mastered
          plugin_topics_limit: 15