name: Metrics
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Metrics 1 - Base et Langages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics1.svg
          user: antibill51
          base: header, activity, repositories, metadata
          config_timezone: Europe/Paris
          use_prebuilt_image: yes
          
          # Affichage clair des langages (Python, Shell, etc.)
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 2%

      - name: Metrics 2 - Domotique, Infra et Contributions
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          filename: metrics2.svg
          user: antibill51
          base: ""
          config_timezone: Europe/Paris
          use_prebuilt_image: yes

          # Met en avant les technos clés (Home Assistant, Docker, Proxmox, Python...)
          plugin_topics: yes
          plugin_topics_sort: stars
          plugin_topics_mode: mastered
          plugin_topics_limit: 15

          # Affiche les contributions réelles (Pull requests, issues créées, etc.)
          plugin_activity: yes
          plugin_activity_limit: 5
          plugin_activity_days: 0
          plugin_activity_filter: issue, pr, release, fork, review, ref/create

          # Le calendrier d'activité type "GitHub" sur 6 mois
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year